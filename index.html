<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

/* ESTILO GENERAL PARA TODAS LAS IMÁGENES DEL PORTFOLIO */

.portfolio-img{
width:100%;
max-width:900px;
height:auto;
display:block;
margin:60px auto;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

/* HERO */

.hero{
background:#6d4c8f;
color:#ffb26b;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:90px;
letter-spacing:5px;
text-shadow:6px 6px #1e1e1e;
}

.hero span{
font-size:25px;
border:3px solid #ffb26b;
padding:5px 20px;
border-radius:20px;
margin-bottom:20px;
}

.hero p{
color:white;
font-size:20px;
}

/* PERFIL */

.profile{
background:#f3d5b5;
padding:60px;
display:flex;
justify-content:center;
}

.profile-card{
background:#f0d8b8;
padding:30px;
border-radius:20px;
display:flex;
gap:30px;
max-width:900px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.profile img{
width:180px;
border-radius:10px;
}

.profile-info h2{
margin-bottom:10px;
}

.profile-info p{
line-height:1.5;
margin-bottom:10px;
}

.skills{
display:flex;
gap:15px;
margin-top:10px;
}

.skill{
background:#3a2b2b;
color:white;
padding:10px 15px;
border-radius:10px;
}

footer{
background:#6d4c8f;
color:white;
text-align:center;
padding:20px;
margin-top:60px;
}

</style>
</head>
